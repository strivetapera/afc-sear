services:
  postgres:
    image: postgres:16-alpine
    container_name: afc-sear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afc_sear_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - afc-sear-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afc_sear_platform"]
      interval: 5s
      timeout: 5s
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: afc-sear-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  afc-sear-postgres-data:
