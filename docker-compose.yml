services:
  postgres:
    image: postgres:16-alpine
    container_name: afc-sear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afc_sear_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - afc-sear-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afc_sear_platform"]
      interval: 5s
      timeout: 5s
  
  redis:
    image: redis:7-alpine
    container_name: afc-sear-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - afc-sear-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s

volumes:
  afc-sear-postgres-data:
  afc-sear-redis-data:
